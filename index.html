<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Guess The Number</title>
  </head>
  <body>
    <div class="main-container">
      <div class="instructions-container">
        <div class="again-button">
          <button class="again" type="button">AGAIN!</button>
        </div>
        <div class="instructions">
          <div class="text">&lt;&lt;Between 1 and 20&gt;&gt;</div>
        </div>
      </div>
      <div class="heading">
        GUESS THE NUMBER
      </div>
      <div class="line">
        <div class="result-box">?</div>
      </div>
      <div class="input-container">
        <div class="input-box-container">
          Start checking:
          <div class="input-box">
            <input type="text" class="input-box-input" />
          </div>
        </div>
        <div class="scores-main-container">
          <div class="scores-container">
            💯 Score:
            <div class="score">20</div>
          </div>
          <div class="high-score-container">
            🥇 High Score:
            <div class="high-score">0</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
